name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make pkg-config libgtkmm-4.0-dev

      - name: Build
        run: make

      - name: Test (headless sweep)
        env:
          MICRORECIF_HEADLESS: "1"
        run: make test
